<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - J&M Doces</title>

    <link rel="shortcut icon" href="images/J&M_LOGO.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="styles/cardapio.css">
</head>

<body>
    <header>
        <img src="images/J&M_LOGO.jpeg" alt="J&M-logo" class="logo">
        <h1>Nosso Cardápio</h1>
    </header>
    <main>
        <!-- aqui as seções -->
        <section class="section">
            <h2>Doces</h2>
            <div class="carousel">
                <button class="prev"> < </button>
                <div class="carousel-track" id="doces-container"></div>
                <button class="next"> > </button>

            </div>
            <!-- aqui os produtos serão renderizados pelo script -->
        </section>
        <section class="section">
            <h2>Boxes</h2>
            <div class="carousel">
                <button class="prev"> < </button>
                <div class="carousel-track" id="boxes-container"></div>
                <button class="next"> > </button>

            </div>
            <!-- aqui os produtos serão renderizados pelo script -->
        </section>
        <section class="section">
            <h2>Combos</h2>
            <div class="carousel">
                <button class="prev"> < </button>
                <div class="carousel-track" id="combos-container"></div>
                <button class="next"> > </button>

            </div>
            <!-- aqui os produtos serão renderizados pelo script -->
        </section>

        <!-- esse aqui é o modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
        
                <img id="modal-img" src="" alt="produto">
        
                <h2 id="modal-title"></h2>
                <p class="modal-subtitle" id="modal-subtitle"></p>
        
                <h3 id="list-subtitle"></h3>
                <ul class="modal-list" id="modal-list"></ul>
        
                <h3 id="optional-list-subtitle"></h3>
                <ul class="modal-list" id="optional-modal-list"></ul>
        
                <p class="modal-price" id="modal-price"></p>
        
                <a class="btn" href="contact.html">Fazer pedido</a>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 J&M Doces</p>
    </footer>

    <script type="module" src="scripts/app.js"></script>
